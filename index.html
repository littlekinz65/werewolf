<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf: Bloodline</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap');

        :root {
            --blood-red: #8a0303;
            --blood-orange: #ff4500;
            --dark-void: #0a0a0a;
            --ui-bg: rgba(15, 15, 15, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #000; display: flex; justify-content: center; align-items: center;
            font-family: 'Almendra', serif; color: #e0e0e0;
        }

        #app-container {
            width: 100%; max-width: 430px; height: 100%; max-height: 932px;
            background-color: var(--dark-void);
            background-image: url('assets/backgrounds/bg_lobby.jpg');
            background-size: cover; background-position: center;
            position: relative; box-shadow: 0 0 30px rgba(138, 3, 3, 0.5); 
            display: flex; flex-direction: column; overflow: hidden; transition: background 1s ease;
        }

        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; background: rgba(0,0,0,0.6); }
        .hidden { display: none !important; }

        h2 { text-align: center; color: var(--blood-red); text-shadow: 2px 2px 4px #000; letter-spacing: 2px; font-weight: 700; border-bottom: 1px solid var(--blood-red); padding-bottom: 10px;}
        label { color: #aaa; font-size: 0.9rem; margin-top: 10px; display: flex; justify-content: space-between;}

        .btn-custom {
            background: linear-gradient(180deg, #2a0808 0%, #110000 100%); border: 1px solid var(--blood-red); color: #fff;
            padding: 15px; font-size: 1.3rem; cursor: pointer; font-family: 'Almendra', serif; border-radius: 5px; margin: 10px 0;
            text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.8); transition: 0.3s;
        }
        .btn-custom:active { transform: scale(0.98); box-shadow: 0 0 10px var(--blood-red); }

        input[type="text"], input[type="number"] {
            background: rgba(0,0,0,0.7); border: 1px solid #444; border-left: 3px solid var(--blood-red);
            color: white; padding: 12px; font-size: 1.1rem; width: 100%; box-sizing: border-box; margin: 5px 0 15px 0;
            font-family: 'Almendra', serif; outline: none;
        }

        /* Sliders */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--blood-red); cursor: pointer; margin-top: -8px; box-shadow: 0 0 5px var(--blood-orange); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #333; border-radius: 3px; border: 1px solid #000; }

        .profile-preview { width: 100px; height: 100px; border-radius: 8px; border: 3px solid var(--blood-red); cursor: pointer; margin: 10px auto; display: block; box-shadow: 0 0 15px rgba(138,3,3,0.8); object-fit: cover;}
        
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box;}
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; padding: 10px; }
        .avatar-opt { width: 100%; aspect-ratio: 1/1; border-radius: 6px; border: 2px solid transparent; cursor: pointer; object-fit: cover; }
        .avatar-opt.selected { border-color: var(--blood-orange); filter: drop-shadow(0 0 5px var(--blood-orange)); }

        /* Game Stage */
        #top-status-bar { text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--blood-orange); padding: 5px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; letter-spacing: 1px;}
        #game-stage { flex: 1; display: grid; grid-template-columns: 80px 1fr 80px; gap: 5px; margin-top: 5px; overflow: hidden; }
        .side-panel { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-bottom: 10px;}
        
        .p-slot { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border: 1px solid #333; padding: 5px; border-radius: 8px; text-align: center; font-size: 11px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .p-avatar { width: 60px; height: 60px; border-radius: 6px; border: 1px solid var(--blood-red); object-fit: cover; position: relative; z-index: 2; }
        .kick-btn { position: absolute; top: -5px; right: -5px; width: 22px; height: 22px; cursor: pointer; background: #000; border-radius: 50%; z-index: 10; }

        /* --- CHAT SYSTEM --- */
        #chat-window { background: var(--ui-bg); border: 1px solid #333; border-radius: 5px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-tabs { display: flex; background: #000; border-bottom: 1px solid var(--blood-red); }
        .c-tab { flex: 1; text-align: center; padding: 8px; cursor: pointer; color: #777; font-weight: bold; letter-spacing: 1px; font-size: 0.9rem;}
        .c-tab.active { color: var(--blood-orange); background: rgba(138,3,3,0.2); }
        
        #chat-history { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; font-family: sans-serif; display: flex; flex-direction: column; gap: 5px;}
        .msg { background: rgba(255,255,255,0.1); padding: 5px 8px; border-radius: 4px; word-wrap: break-word;}
        .msg.private { background: rgba(138,3,3,0.3); border-left: 2px solid var(--blood-orange); }
        
        #bottom-bar { display: flex; align-items: center; padding: 5px; background: #0a0a0a; border-top: 1px solid var(--blood-red); gap: 5px;}
        #private-target { background: #222; color: white; border: 1px solid #444; border-radius: 4px; padding: 5px; max-width: 80px; display: none;}
        
        #emoji-drawer { position: absolute; bottom: 60px; right: 5px; background: #111; border: 1px solid var(--blood-red); border-radius: 8px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; z-index: 500; }

        /* --- EMOJI CENTER ANIMATION --- */
        @keyframes centerFloatFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            70% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -90%) scale(1); }
        }
        .anim-emoji { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; pointer-events: none; z-index: 100; animation: centerFloatFade 2s forwards ease-out; }

        /* --- 4-CARD REVEAL ANIMATION --- */
        #role-reveal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .reveal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .r-card {
            width: 120px; height: 180px; transition: 0.8s; transform-style: preserve-3d; position: relative;
        }
        .r-card.flip-down { transform: rotateY(180deg); opacity: 0.3; }
        .r-card.winner { transform: scale(1.3) translateY(-20px); box-shadow: 0 0 30px var(--blood-orange); z-index: 10; }
        .r-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; background-size: cover; border: 2px solid #333;}
        .r-front { transform: rotateY(0deg); }
        .r-back { background-image: url('assets/cards/card_back.png'); transform: rotateY(180deg); }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="start-screen" class="screen">
        <img src="assets/ui/werewolf.png" style="width: 90%; margin: 60px auto 40px auto; filter: drop-shadow(0 0 10px rgba(138,3,3,0.8));">
        <button class="btn-custom" onclick="showScreen('config-screen')">CREATE ROOM</button>
        <div style="text-align: center; margin: 20px 0; color: #555;">— OR —</div>
        <input type="text" id="join-code" placeholder="ENTER 4-LETTER CODE" style="text-align: center; letter-spacing: 5px; font-weight: bold;" maxlength="4">
        <button class="btn-custom" style="border-color: #444;" onclick="prepareJoin()">JOIN ROOM</button>
    </div>

    <div id="config-screen" class="screen hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <img src="assets/ui/icon_exit.png" style="height:35px; cursor:pointer;" onclick="location.reload()">
            <h2 style="margin:0; border:none;">THE RITUAL</h2><div style="width:35px;"></div> 
        </div>
        
        <img src="assets/avatars/avatar_01.png" id="host-avatar-prev" class="profile-preview" onclick="openAvatarModal('host')">
        
        <label>YOUR NAME</label>
        <input type="text" id="host-name" placeholder="Enter username..." maxlength="12">
        
        <div style="background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; border: 1px solid #333;">
            <label><span>MAX PLAYERS</span> <span id="val-players" style="color:var(--blood-orange);">8</span></label>
            <input type="range" id="cfg-players" min="5" max="16" value="8" oninput="updateSliders()">
            
            <label><span>SEERS</span> <span id="val-seers" style="color:var(--blood-orange);">1</span></label>
            <input type="range" id="cfg-seers" min="0" max="3" value="1" oninput="updateSliders()">

            <label><span>DOCTORS</span> <span id="val-docs" style="color:var(--blood-orange);">1</span></label>
            <input type="range" id="cfg-docs" min="0" max="3" value="1" oninput="updateSliders()">
        </div>
        <button class="btn-custom" onclick="createRoom()" style="margin-top: 20px;">SUMMON LOBBY</button>
    </div>

    <div id="join-setup" class="screen hidden">
        <img src="assets/ui/icon_exit.png" style="height:35px; cursor:pointer; position:absolute; top:20px; left:20px;" onclick="location.reload()">
        <h2 style="margin-top: 50px;">JOINING: <span id="target-room" style="color:white;"></span></h2>
        <img src="assets/avatars/avatar_02.png" id="player-avatar-prev" class="profile-preview" onclick="openAvatarModal('player')">
        <label>YOUR NAME</label>
        <input type="text" id="player-name" placeholder="Enter username..." maxlength="12">
        <button class="btn-custom" onclick="finalizeJoin()">ENTER LOBBY</button>
    </div>

    <div id="game-screen" class="screen hidden" style="padding: 10px;">
        <div id="lobby-header" style="display:flex; justify-content:space-between; align-items:center; background: #000; padding: 10px; border-bottom: 2px solid var(--blood-red); border-radius: 5px;">
            <img src="assets/ui/icon_exit.png" style="height:30px; cursor:pointer;" onclick="location.reload()">
            <h3 id="room-id-display" style="margin:0; letter-spacing: 2px;">ROOM: ----</h3>
            <button id="start-game-btn" class="hidden" style="background:var(--blood-red); color:white; border:none; padding:8px 15px; border-radius:3px; font-family:'Almendra'; font-weight:bold; cursor:pointer; font-size:1.1rem;" onclick="initiateRoleReveal()">PLAY</button>
        </div>

        <div id="top-status-bar">WAITING FOR PLAYERS...</div>

        <div id="game-stage">
            <div id="left-slots" class="side-panel"></div>
            
            <div id="chat-window">
                <div id="chat-tabs">
                    <div class="c-tab active" id="tab-global" onclick="switchChat('global')">GLOBAL</div>
                    <div class="c-tab" id="tab-private" onclick="switchChat('private')">PRIVATE</div>
                </div>

                <div id="chat-history"></div>
                <div id="emoji-drawer"></div>

                <div id="bottom-bar">
                    <img src="assets/emojis/1.png" style="height:35px; cursor:pointer;" onclick="toggleEmoji()">
                    <select id="private-target"></select>
                    <input type="text" id="chat-input" placeholder="Message..." style="margin:0; flex:1; font-family: sans-serif; font-size: 1rem; padding: 8px;">
                    <img src="assets/ui/enter.png" style="height:40px; cursor:pointer;" onclick="sendChat()">
                </div>
            </div>
            
            <div id="right-slots" class="side-panel"></div>
        </div>
    </div>

    <div id="avatar-modal" class="modal">
        <h2>SELECT YOUR FORM</h2>
        <div class="avatar-grid" id="modal-grid"></div>
        <button class="btn-custom" onclick="closeAvatarModal()" style="margin-top:auto;">CONFIRM</button>
    </div>

    <div id="role-reveal-overlay">
        <h2 style="border:none; margin-bottom: 40px; font-size:2rem;">YOUR DESTINY</h2>
        <div class="reveal-grid">
            <div class="r-card" id="rev-villager"><div class="r-face r-front" style="background-image:url('assets/cards/card_villager.png')"></div><div class="r-face r-back"></div></div>
            <div class="r-card" id="rev-wolf"><div class="r-face r-front" style="background-image:url('assets/cards/card_wolf.png')"></div><div class="r-face r-back"></div></div>
            <div class="r-card" id="rev-seer"><div class="r-face r-front" style="background-image:url('assets/cards/card_seer.png')"></div><div class="r-face r-back"></div></div>
            <div class="r-card" id="rev-doc"><div class="r-face r-front" style="background-image:url('assets/cards/card_doc.png')"></div><div class="r-face r-back"></div></div>
        </div>
        <h3 id="role-text-display" style="color:var(--blood-orange); opacity:0; transition: 1s; font-size: 1.5rem; margin-top: 30px;"></h3>
    </div>

</div>

<script>
    const SUPABASE_URL = "https://uzqgleedmzxicejpbqqx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6cWdsZWVkbXp4aWNlanBicXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzQ2MzEsImV4cCI6MjA5NDMxMDYzMX0.uO3efVivjiPYC4sQL2eSXjaA20xYV4Afyo0ORdL4HTs";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myId, myRoom, myName, myAvatar = "01", isHost = false, isMaster = false, targetProfile = 'host';
    let localGameConfig = { maxPlayers: 8, seers: 1, docs: 1 }; 
    let roomChannel; 
    let currentChatTab = 'global';
    let gameLoopInterval = null;

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

    // --- CONFIG SLIDERS ---
    function updateSliders() {
        const p = parseInt(document.getElementById('cfg-players').value);
        document.getElementById('val-players').innerText = p;
        
        let s = parseInt(document.getElementById('cfg-seers').value);
        let d = parseInt(document.getElementById('cfg-docs').value);
        
        // Cap special roles to reasonable limits based on total players
        if(s + d >= p - 2) { s = Math.max(0, s-1); d = Math.max(0, d-1); }
        
        document.getElementById('cfg-seers').value = s; document.getElementById('val-seers').innerText = s;
        document.getElementById('cfg-docs').value = d; document.getElementById('val-docs').innerText = d;
        localGameConfig = { maxPlayers: p, seers: s, docs: d };
    }

    // --- AVATARS & NAMES ---
    function openAvatarModal(type) {
        targetProfile = type; const modal = document.getElementById('avatar-modal'); const grid = document.getElementById('modal-grid');
        grid.innerHTML = '';
        for(let i=1; i<=16; i++) { let num = i < 10 ? '0'+i : i; grid.innerHTML += `<img src="assets/avatars/avatar_${num}.png" class="avatar-opt" onclick="setAvatar('${num}')">`; }
        modal.style.display = 'flex';
    }
    function setAvatar(num) { myAvatar = num; document.getElementById(targetProfile === 'host' ? 'host-avatar-prev' : 'player-avatar-prev').src = `assets/avatars/avatar_${num}.png`; closeAvatarModal(); }
    function closeAvatarModal() { document.getElementById('avatar-modal').style.display = 'none'; }

    function processName(val) {
        let raw = val.trim(); let splitIndex = raw.indexOf('_');
        if (splitIndex !== -1) {
            let base = raw.substring(0, splitIndex).substring(0, 6);
            if (raw.substring(splitIndex + 1) === 'BLACK') { isMaster = true; myName = base; } 
            else { isMaster = false; myName = base; }
        } else { isMaster = false; myName = raw.substring(0, 6); }
    }

    // --- ENTRY & REJOIN ---
    async function createRoom() {
        const nameInput = document.getElementById('host-name').value;
        if(!nameInput.trim()) return alert("Enter a name.");
        isHost = true; myRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
        processName(nameInput);
        await sb.from('rooms').insert([{ room_code: myRoom, phase: 'LOBBY', time_remaining: 0 }]);
        enterLobby();
    }

    function prepareJoin() {
        myRoom = document.getElementById('join-code').value.toUpperCase().trim();
        if(!myRoom) return; document.getElementById('target-room').innerText = myRoom;
        let r = Math.floor(Math.random() * 16) + 1; setAvatar(r < 10 ? '0'+r : r); 
        showScreen('join-setup');
    }

    async function finalizeJoin() {
        const nameInput = document.getElementById('player-name').value;
        if(!nameInput.trim()) return alert("Enter a name.");
        processName(nameInput);
        enterLobby();
    }

    async function enterLobby() {
        // Rejoin Logic: Check if player exists
        const { data: existing } = await sb.from('players').select('*').eq('room_code', myRoom).eq('username', myName);
        if(existing && existing.length > 0) {
            myId = existing[0].id;
            await sb.from('players').update({ avatar: myAvatar }).eq('id', myId);
        } else {
            const { data } = await sb.from('players').insert([{ room_code: myRoom, username: myName, avatar: myAvatar, is_master: isMaster }]).select();
            myId = data[0].id;
        }

        document.getElementById('room-id-display').innerText = `ROOM: ${myRoom}`;
        showScreen('game-screen');
        if(isHost) document.getElementById('start-game-btn').classList.remove('hidden');
        
        initRealtime(); buildEmojiDrawer();
    }

    // --- REALTIME ---
    function initRealtime() {
        sb.channel('db_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_code=eq.${myRoom}` }, () => { syncGrid(); }).subscribe();
        
        sb.channel('room_sync').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `room_code=eq.${myRoom}` }, (payload) => {
            const r = payload.new;
            document.getElementById('top-status-bar').innerText = `${r.phase} PHASE - ${r.time_remaining}s`;
            if(r.phase === 'NIGHT') document.getElementById('app-container').style.backgroundImage = "url('assets/backgrounds/bg_night.jpg')";
            else if(r.phase === 'DAY' || r.phase === 'VOTING') document.getElementById('app-container').style.backgroundImage = "url('assets/backgrounds/bg_day.jpg')";
            else if(r.phase === 'LOBBY') { document.getElementById('app-container').style.backgroundImage = "url('assets/backgrounds/bg_lobby.jpg')"; document.getElementById('top-status-bar').innerText = `WAITING FOR PLAYERS...`; if(isHost) document.getElementById('start-game-btn').style.display='block';}
        }).subscribe();

        roomChannel = sb.channel(`chat_${myRoom}`, { config: { broadcast: { self: true } } });
        roomChannel.on('broadcast', { event: 'msg' }, payload => {
            const hist = document.getElementById('chat-history');
            const p = payload.payload;
            if(p.type === 'global' && currentChatTab === 'global') {
                hist.innerHTML += `<div class="msg"><b>${p.sender}:</b> ${p.text}</div>`;
            } else if (p.type === 'private' && (p.targetId == myId || p.senderId == myId || isMaster)) {
                hist.innerHTML += `<div class="msg private"><b>[Priv] ${p.sender}:</b> ${p.text}</div>`;
            }
            hist.scrollTop = hist.scrollHeight;
        });

        roomChannel.on('broadcast', { event: 'emoji' }, payload => { triggerEmojiAnimation(payload.payload.pid, payload.payload.emojiNum); });
        roomChannel.on('broadcast', { event: 'trigger_reveal' }, payload => { runCardAnimation(payload.payload.roles); });
        
        roomChannel.subscribe(); syncGrid();
    }

    async function syncGrid() {
        const { data: players } = await sb.from('players').select('*').eq('room_code', myRoom).order('id', {ascending: true});
        const left = document.getElementById('left-slots'); const right = document.getElementById('right-slots');
        const pTarget = document.getElementById('private-target');
        left.innerHTML = ''; right.innerHTML = ''; pTarget.innerHTML = '';

        players.forEach((p, i) => {
            const slot = `
                <div class="p-slot" id="slot-${p.id}">
                    ${isHost && p.id != myId && document.getElementById('top-status-bar').innerText.includes('WAITING') ? `<img src="assets/ui/icon_kick.png" class="kick-btn" onclick="kick(${p.id})">` : ''}
                    <img src="assets/avatars/avatar_${p.avatar}.png" class="p-avatar">
                    <div style="margin-top:5px; font-weight:bold; overflow:hidden;">${p.username}</div>
                    ${isMaster ? `<div style="color:cyan; font-size:8px;">${p.role || ''}</div>` : ''}
                </div>`;
            if(i % 2 === 0) left.innerHTML += slot; else right.innerHTML += slot;
            if(p.id != myId) pTarget.innerHTML += `<option value="${p.id}">${p.username}</option>`;
        });
    }

    async function kick(id) { await sb.from('players').delete().eq('id', id); }

    // --- CHAT & TABS ---
    function switchChat(type) {
        currentChatTab = type;
        document.getElementById('tab-global').classList.toggle('active', type === 'global');
        document.getElementById('tab-private').classList.toggle('active', type === 'private');
        document.getElementById('private-target').style.display = type === 'private' ? 'block' : 'none';
        document.getElementById('chat-history').innerHTML = ''; // Clear view on swap
    }

    function sendChat() {
        const input = document.getElementById('chat-input'); if(!input.value.trim()) return;
        let payload = { sender: myName, senderId: myId, text: input.value, type: currentChatTab };
        if(currentChatTab === 'private') payload.targetId = document.getElementById('private-target').value;
        roomChannel.send({ type: 'broadcast', event: 'msg', payload: payload });
        input.value = '';
    }

    // --- EMOJIS ---
    function buildEmojiDrawer() {
        const drawer = document.getElementById('emoji-drawer');
        for(let i=1; i<=16; i++) { drawer.innerHTML += `<img src="assets/emojis/${i}.png" style="width:35px; cursor:pointer;" onclick="castEmoji(${i})">`; }
    }
    function toggleEmoji() { const d = document.getElementById('emoji-drawer'); d.style.display = d.style.display === 'grid' ? 'none' : 'grid'; }
    function castEmoji(num) { document.getElementById('emoji-drawer').style.display = 'none'; roomChannel.send({ type: 'broadcast', event: 'emoji', payload: { pid: myId, emojiNum: num } }); }
    function triggerEmojiAnimation(pid, num) {
        const slot = document.getElementById(`slot-${pid}`); if(!slot) return;
        const img = document.createElement('img'); img.src = `assets/emojis/${num}.png`; img.className = 'anim-emoji';
        slot.appendChild(img); setTimeout(() => slot.removeChild(img), 2000); 
    }

    // --- GAME PHASES & CARD REVEAL ---
    async function initiateRoleReveal() {
        document.getElementById('start-game-btn').style.display = 'none';
        const { data: players } = await sb.from('players').select('*').eq('room_code', myRoom);
        
        // Basic Role Assignment
        let pool = [];
        for(let i=0; i<localGameConfig.seers; i++) pool.push('Seer');
        for(let i=0; i<localGameConfig.docs; i++) pool.push('Doctor');
        let wCount = Math.max(1, Math.floor(players.length / 3));
        for(let i=0; i<wCount; i++) pool.push('Werewolf');
        while(pool.length < players.length) pool.push('Villager');
        pool.sort(() => Math.random() - 0.5);

        let assignments = {};
        for(let i=0; i<players.length; i++) {
            let r = players[i].is_master ? 'MASTER' : pool[i];
            assignments[players[i].id] = r;
            await sb.from('players').update({ role: r }).eq('id', players[i].id);
        }

        roomChannel.send({ type: 'broadcast', event: 'trigger_reveal', payload: { roles: assignments } });
        
        // Host waits for animation, then starts Night 1
        setTimeout(async () => {
            await sb.from('rooms').update({ phase: 'NIGHT', time_remaining: 30 }).eq('room_code', myRoom);
            hostGameLoop('NIGHT', 30);
        }, 6000);
    }

    function runCardAnimation(roleMap) {
        const myAssignedRole = roleMap[myId];
        if(!myAssignedRole || myAssignedRole === 'MASTER') return; // Master skips animation

        const overlay = document.getElementById('role-reveal-overlay');
        const cards = ['villager', 'wolf', 'seer', 'doc'];
        
        // Reset state
        cards.forEach(c => {
            const el = document.getElementById(`rev-${c}`);
            el.className = 'r-card'; // Remove flipped/winner classes
        });
        document.getElementById('role-text-display').style.opacity = 0;
        
        overlay.style.display = 'flex';

        setTimeout(() => {
            cards.forEach(c => {
                let targetId = `rev-${c}`;
                let isWinner = false;
                if(c === 'wolf' && myAssignedRole === 'Werewolf') isWinner = true;
                if(c === 'seer' && myAssignedRole === 'Seer') isWinner = true;
                if(c === 'doc' && myAssignedRole === 'Doctor') isWinner = true;
                if(c === 'villager' && myAssignedRole === 'Villager') isWinner = true;

                if(!isWinner) {
                    document.getElementById(targetId).classList.add('flip-down');
                } else {
                    document.getElementById(targetId).classList.add('winner');
                    document.getElementById('role-text-display').innerText = `YOU ARE A ${myAssignedRole.toUpperCase()}`;
                    document.getElementById('role-text-display').style.opacity = 1;
                }
            });
        }, 2000);

        setTimeout(() => { overlay.style.display = 'none'; }, 5500);
    }

    // Host automated timer loop
    function hostGameLoop(phase, duration) {
        let currentTimer = duration;
        clearInterval(gameLoopInterval);
        
        gameLoopInterval = setInterval(async () => {
            currentTimer--;
            await sb.from('rooms').update({ time_remaining: currentTimer }).eq('room_code', myRoom);

            if(currentTimer <= 0) {
                clearInterval(gameLoopInterval);
                let nextPhase = phase === 'NIGHT' ? 'DAY' : 'VOTING';
                let nextDuration = phase === 'NIGHT' ? 45 : 30; // Day 45s, Voting 30s
                
                // Demo logic: End game after Voting
                if(phase === 'VOTING') {
                    await sb.from('rooms').update({ phase: 'LOBBY', time_remaining: 0 }).eq('room_code', myRoom);
                    roomChannel.send({ type: 'broadcast', event: 'msg', payload: { sender: 'SYSTEM', text: 'GAME OVER! Returning to Lobby.', type: 'global' } });
                } else {
                    await sb.from('rooms').update({ phase: nextPhase, time_remaining: nextDuration }).eq('room_code', myRoom);
                    hostGameLoop(nextPhase, nextDuration);
                }
            }
        }, 1000);
    }
</script>
