<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf Mobile LAN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ui-font: 'Almendra', serif; /* Use a gothic/mystical font style */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; /* Disable mobile scroll/navigation */
            font-family: sans-serif;
            background-color: #000;
        }

        #game-container {
            width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            transition: background 1s ease;
        }

        /* --- Header Section --- */
        #header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: rgba(0,0,0,0.6);
        }

        .logo { height: 40px; }
        .nav-btn { height: 40px; cursor: pointer; }

        /* --- Main Game Layout (Split 16 Players) --- */
        #main-stage {
            flex: 1;
            display: grid;
            grid-template-columns: 120px 1fr 120px; /* 8 left - Chat - 8 right */
            gap: 5px;
            padding: 10px;
            overflow: hidden;
        }

        .side-panel {
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            gap: 5px;
        }

        /* Player Profile Slots */
        .player-slot {
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .p-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #555; }
        .p-name { color: #fff; margin-top: 2px; font-weight: bold; text-align: center; width: 90%; overflow: hidden; }
        .p-role { color: #ffd700; font-style: italic; display: none; } /* Master only */

        /* Emojis & Notifications */
        .emoji-overlay {
            position: absolute;
            top: -10px; right: 10px;
            width: 30px; height: 30px;
            z-index: 10;
        }

        .notif-icon {
            position: absolute;
            bottom: 5px; right: 5px;
            width: 20px; height: 20px;
            display: none;
        }

        /* --- Central Chat Column --- */
        #center-col {
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 5px;
        }

        #chat-tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #333;
            color: #ccc;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
            font-size: 12px;
        }

        .tab.active { background: #555; color: #fff; font-weight: bold; }
        .tab.secret { background: #4b0082; display: none; } /* Shown for _BLACK */

        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            font-size: 13px;
        }

        .chat-msg { margin-bottom: 8px; }
        .chat-msg b { color: #4fc3f7; }

        /* --- Bottom Controls --- */
        #input-area {
            height: 100px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            background: rgba(0,0,0,0.8);
        }

        #msg-input { flex: 1; padding: 12px; border-radius: 5px; border: none; }
        .btn-ui { height: 50px; cursor: pointer; }

        /* Emoji Menu (1.png trigger) */
        #emoji-menu {
            position: absolute;
            bottom: 110px; left: 15px;
            background: #222;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; padding: 10px;
            border-radius: 10px;
            border: 2px solid #444;
        }
        .emoji-item { width: 40px; height: 40px; cursor: pointer; }

        /* --- Role Card Animation --- */
        #card-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center; justify-content: center;
            z-index: 100;
        }

        .card {
            width: 280px; height: 420px;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            position: relative;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
        }
        .card-front { transform: rotateY(180deg); background-size: cover; }
        .card-back { background-image: url('assets/cards/card_back.png'); background-size: cover; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container" style="background-image: url('assets/backgrounds/bg_lobby.jpg');">
    
    <div id="header">
        <img src="assets/ui/icon_exit.png" class="nav-btn" onclick="exitGame()">
        <img src="assets/ui/werewolf.png" class="logo">
        <img src="assets/ui/icon_settings.png" class="nav-btn" id="host-settings" onclick="toggleSettings()">
    </div>

    <div id="main-stage">
        <div id="left-side" class="side-panel">
            </div>

        <div id="center-col">
            <div id="chat-tabs">
                <div class="tab active" onclick="setTab('global')">🌐 Global</div>
                <div class="tab" onclick="setTab('private')">👤 Private</div>
                <div class="tab secret" id="master-tab" onclick="setTab('secret')">👁️ Secret</div>
            </div>
            <div id="chat-history"></div>
        </div>

        <div id="right-side" class="side-panel">
            </div>
    </div>

    <div id="emoji-menu">
        </div>

    <div id="input-area">
        <img src="assets/emojis/1.png" class="btn-ui" onclick="toggleEmojis()">
        <input type="text" id="msg-input" placeholder="Whisper something...">
        <img src="assets/ui/enter.png" class="btn-ui" onclick="handleSend()">
    </div>
</div>

<div id="card-overlay" onclick="this.style.display='none'">
    <div class="card" id="reveal-card">
        <div class="card-face card-back"></div>
        <div class="card-face card-front" id="card-art"></div>
    </div>
</div>

<script>
    // --- DATABASE CONFIG ---
    const SUPABASE_URL = "https://uzqgleedmzxicejpbqqx.supabase.co"; 
    const SUPABASE_KEY = "YOUR_ANON_KEY"; 
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myId, myRoom, myName, myRole, isMaster = false, currentTab = 'global';

    // Initialize Layout
    function buildPlayerGrid() {
        const left = document.getElementById('left-side');
        const right = document.getElementById('right-side');
        
        for(let i=0; i<16; i++) {
            const html = `
                <div class="player-slot" id="slot-${i}">
                    <img src="assets/ui/notification.png" class="notif-icon" id="notif-${i}">
                    <img src="" class="p-avatar" id="avatar-${i}">
                    <img src="" class="emoji-overlay" id="emoji-${i}">
                    <span class="p-name" id="name-${i}">Empty</span>
                    <span class="p-role" id="role-${i}"></span>
                    <img src="assets/ui/icon_kick.png" class="nav-btn hidden" style="height:20px" id="kick-${i}" onclick="kickPlayer(${i})">
                </div>`;
            if(i < 8) left.innerHTML += html; else right.innerHTML += html;
        }
    }

    // --- GAME LOGIC ---
    async function joinGame(name, roomCode) {
        myName = name;
        myRoom = roomCode;
        if(name.endsWith('_BLACK')) {
            isMaster = true;
            document.getElementById('master-tab').style.display = 'block';
        }
        // Normal Supabase Join Logic here...
    }

    function setTab(type) {
        currentTab = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        // Update UI to filter chat logic...
    }

    function toggleEmojis() {
        const menu = document.getElementById('emoji-menu');
        menu.style.display = menu.style.display === 'grid' ? 'none' : 'grid';
        if(menu.innerHTML === "") {
            for(let i=1; i<=16; i++) {
                menu.innerHTML += `<img src="assets/emojis/${i}.png" class="emoji-item" onclick="sendEmoji(${i})">`;
            }
        }
    }

    function showRole(role) {
        myRole = role;
        const overlay = document.getElementById('card-overlay');
        const card = document.getElementById('reveal-card');
        const art = document.getElementById('card-art');
        
        // Match cards to files
        let file = 'card_villager.png';
        if(role === 'Werewolf') file = 'card_wolf.png';
        if(role === 'Seer') file = 'card_seer.png';
        if(role === 'Doctor') file = 'card_doc.png';

        art.style.backgroundImage = `url('assets/cards/${file}')`;
        overlay.style.display = 'flex';
        setTimeout(() => card.classList.add('flipped'), 500);
    }

    // Force orientation check
    window.addEventListener("orientationchange", function() {
        if(window.orientation === 0) alert("Please rotate to Landscape for the best experience!");
    });

    buildPlayerGrid();
</script>
</body>
</html>
