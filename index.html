<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf: Bloodline</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap');

        :root {
            --blood-red: #8a0303;
            --blood-orange: #ff4500;
            --dark-void: #0a0a0a;
            --ui-bg: rgba(15, 15, 15, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Almendra', serif; color: #e0e0e0;
        }

        #app-container {
            width: 100%; max-width: 430px; 
            height: 100%; max-height: 932px;
            background-color: var(--dark-void);
            background-image: url('assets/backgrounds/bg_lobby.jpg');
            background-size: cover; background-position: center;
            position: relative;
            box-shadow: 0 0 30px rgba(138, 3, 3, 0.5); 
            border: 1px solid #333;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: background 1s ease;
        }

        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; background: rgba(0,0,0,0.6); }
        .hidden { display: none !important; }

        h2 { text-align: center; color: var(--blood-red); text-shadow: 2px 2px 4px #000; letter-spacing: 2px; font-weight: 700; border-bottom: 1px solid var(--blood-red); padding-bottom: 10px;}
        label { color: #aaa; font-size: 0.9rem; margin-top: 10px; display: block; }

        .btn-custom {
            background: linear-gradient(180deg, #2a0808 0%, #110000 100%);
            border: 1px solid var(--blood-red); color: #fff;
            padding: 15px; font-size: 1.3rem; cursor: pointer;
            font-family: 'Almendra', serif; border-radius: 5px; margin: 10px 0;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.8); transition: 0.3s;
        }
        .btn-custom:active { transform: scale(0.98); box-shadow: 0 0 10px var(--blood-red); }

        input {
            background: rgba(0,0,0,0.7); border: 1px solid #444; border-left: 3px solid var(--blood-red);
            color: white; padding: 12px; font-size: 1.1rem; width: 100%; box-sizing: border-box; margin: 5px 0 15px 0;
            font-family: 'Almendra', serif; outline: none;
        }
        input:focus { border-color: var(--blood-orange); }

        /* --- SQUARE AVATARS --- */
        .profile-preview { 
            width: 100px; height: 100px; /* Square Format */
            border-radius: 8px; border: 3px solid var(--blood-red); 
            cursor: pointer; margin: 10px auto; display: block; 
            box-shadow: 0 0 15px rgba(138,3,3,0.8); object-fit: cover;
        }
        
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; padding: 10px; }
        .avatar-opt { width: 100%; aspect-ratio: 1/1; border-radius: 6px; border: 2px solid transparent; cursor: pointer; object-fit: cover; }
        .avatar-opt.selected { border-color: var(--blood-orange); filter: drop-shadow(0 0 5px var(--blood-orange)); }

        /* Game Layout */
        #game-stage { flex: 1; display: grid; grid-template-columns: 80px 1fr 80px; gap: 5px; margin-top: 10px; overflow: hidden; }
        .side-panel { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-bottom: 10px;}
        .p-slot { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border: 1px solid #333; padding: 5px; border-radius: 8px; text-align: center; font-size: 11px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .p-avatar { width: 60px; height: 60px; border-radius: 6px; border: 1px solid var(--blood-red); object-fit: cover; position: relative; z-index: 2; }
        .kick-btn { position: absolute; top: -5px; right: -5px; width: 22px; height: 22px; cursor: pointer; background: #000; border-radius: 50%; z-index: 10; }

        /* --- CHAT & EMOJI --- */
        #chat-window { background: var(--ui-bg); border: 1px solid #333; border-radius: 5px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-history { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; border-bottom: 1px solid #333; font-family: sans-serif; display: flex; flex-direction: column; gap: 5px;}
        .msg { background: rgba(255,255,255,0.1); padding: 5px 8px; border-radius: 4px; word-wrap: break-word;}
        .msg b { color: var(--blood-orange); }
        
        #bottom-bar { display: flex; align-items: center; padding: 5px; background: #0a0a0a; border-top: 1px solid var(--blood-red); gap: 5px;}
        
        #emoji-drawer {
            position: absolute; bottom: 60px; right: 5px; background: #111; border: 1px solid var(--blood-red); border-radius: 8px;
            display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; z-index: 500;
        }

        /* --- FLOATING EMOJI ANIMATION --- */
        @keyframes floatUpFade {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -15px) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -30px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -45px) scale(1); }
        }
        .anim-emoji {
            position: absolute; top: 10px; left: 50%; width: 35px; height: 35px;
            pointer-events: none; z-index: 100;
            animation: floatUpFade 2s forwards ease-out;
        }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="start-screen" class="screen">
        <img src="assets/ui/werewolf.png" style="width: 90%; margin: 60px auto 40px auto; filter: drop-shadow(0 0 10px rgba(138,3,3,0.8));">
        <button class="btn-custom" onclick="showScreen('config-screen')">CREATE ROOM</button>
        <div style="text-align: center; margin: 20px 0; color: #555;">— OR —</div>
        <input type="text" id="join-code" placeholder="ENTER 4-LETTER CODE" style="text-align: center; letter-spacing: 5px; font-weight: bold;" maxlength="4">
        <button class="btn-custom" style="border-color: #444;" onclick="prepareJoin()">JOIN ROOM</button>
    </div>

    <div id="config-screen" class="screen hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <img src="assets/ui/icon_exit.png" style="height:35px; cursor:pointer;" onclick="location.reload()">
            <h2 style="margin:0; border:none;">THE RITUAL</h2>
            <div style="width:35px;"></div> 
        </div>
        
        <img src="assets/avatars/avatar_01.png" id="host-avatar-prev" class="profile-preview" onclick="openAvatarModal('host')">
        
        <label>YOUR NAME</label>
        <input type="text" id="host-name" placeholder="Enter username..." maxlength="12">
        
        <div style="background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; border: 1px solid #333;">
            <label>NIGHT DURATION (SECONDS)</label>
            <input type="number" id="cfg-night" value="30">
            <label>DAY DURATION (0 = UNLIMITED)</label>
            <input type="number" id="cfg-day" value="0">
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>SEERS</label><input type="number" id="cfg-seers" value="1"></div>
                <div style="flex:1;"><label>DOCTORS</label><input type="number" id="cfg-docs" value="1"></div>
            </div>
        </div>
        
        <button class="btn-custom" onclick="createRoom()" style="margin-top: 20px;">SUMMON LOBBY</button>
    </div>

    <div id="join-setup" class="screen hidden">
        <img src="assets/ui/icon_exit.png" style="height:35px; cursor:pointer; position:absolute; top:20px; left:20px;" onclick="location.reload()">
        <h2 style="margin-top: 50px;">JOINING: <span id="target-room" style="color:white;"></span></h2>
        
        <img src="assets/avatars/avatar_02.png" id="player-avatar-prev" class="profile-preview" onclick="openAvatarModal('player')">

        <label>YOUR NAME</label>
        <input type="text" id="player-name" placeholder="Enter username..." maxlength="12">
        <button class="btn-custom" onclick="finalizeJoin()">ENTER LOBBY</button>
    </div>

    <div id="game-screen" class="screen hidden" style="padding: 10px;">
        <div id="lobby-header" style="display:flex; justify-content:space-between; align-items:center; background: #000; padding: 10px; border-bottom: 2px solid var(--blood-red); border-radius: 5px;">
            <img src="assets/ui/icon_exit.png" style="height:30px; cursor:pointer;" onclick="location.reload()">
            <h3 id="room-id-display" style="margin:0; letter-spacing: 2px;">ROOM: ----</h3>
            <button id="start-game-btn" class="hidden" style="background:var(--blood-red); color:white; border:none; padding:8px 15px; border-radius:3px; font-family:'Almendra'; font-weight:bold; cursor:pointer; font-size:1.1rem;" onclick="startGameLoop()">PLAY</button>
        </div>

        <div id="game-stage">
            <div id="left-slots" class="side-panel"></div>
            
            <div id="chat-window">
                <div id="chat-history"></div>
                
                <div id="emoji-drawer"></div>

                <div id="bottom-bar">
                    <img src="assets/emojis/1.png" style="height:35px; cursor:pointer;" onclick="toggleEmoji()">
                    <input type="text" id="chat-input" placeholder="Whisper..." style="margin:0; flex:1; font-family: sans-serif; font-size: 1rem; padding: 8px;">
                    <img src="assets/ui/enter.png" style="height:40px; cursor:pointer;" onclick="sendChat()">
                </div>
            </div>
            
            <div id="right-slots" class="side-panel"></div>
        </div>
    </div>

    <div id="avatar-modal" class="modal">
        <h2>SELECT YOUR FORM</h2>
        <div class="avatar-grid" id="modal-grid"></div>
        <button class="btn-custom" onclick="closeAvatarModal()" style="margin-top:auto;">CONFIRM</button>
    </div>

</div>

<script>
    const SUPABASE_URL = "https://uzqgleedmzxicejpbqqx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6cWdsZWVkbXp4aWNlanBicXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzQ2MzEsImV4cCI6MjA5NDMxMDYzMX0.uO3efVivjiPYC4sQL2eSXjaA20xYV4Afyo0ORdL4HTs";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myId, myRoom, myName, myAvatar = "01", isHost = false, isMaster = false, targetProfile = 'host';
    let localGameConfig = {}; 
    let roomChannel; // Realtime Broadcast Channel

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- AVATAR LOGIC ---
    function openAvatarModal(type) {
        targetProfile = type;
        const modal = document.getElementById('avatar-modal');
        const grid = document.getElementById('modal-grid');
        grid.innerHTML = '';
        for(let i=1; i<=16; i++) {
            const num = i < 10 ? '0'+i : i;
            grid.innerHTML += `<img src="assets/avatars/avatar_${num}.png" class="avatar-opt" onclick="setAvatar('${num}')">`;
        }
        modal.style.display = 'flex';
    }

    function setAvatar(num) {
        myAvatar = num;
        const imgId = targetProfile === 'host' ? 'host-avatar-prev' : 'player-avatar-prev';
        document.getElementById(imgId).src = `assets/avatars/avatar_${num}.png`;
        closeAvatarModal();
    }
    function closeAvatarModal() { document.getElementById('avatar-modal').style.display = 'none'; }

    // --- USERNAME LOGIC (GHOST HANDLING) ---
    function processName(val) {
        let raw = val.trim();
        let splitIndex = raw.indexOf('_');
        
        if (splitIndex !== -1) {
            let base = raw.substring(0, splitIndex).substring(0, 6); // Max 6 chars before _
            let suffix = raw.substring(splitIndex + 1);
            if (suffix === 'BLACK') {
                isMaster = true;
                myName = base;
            } else {
                isMaster = false;
                myName = base; // Discard invalid text after _
            }
        } else {
            isMaster = false;
            myName = raw.substring(0, 6); // Hard cap at 6
        }
    }

    // --- ENTRY LOGIC ---
    async function createRoom() {
        const nameInput = document.getElementById('host-name').value;
        if(!nameInput.trim()) return alert("You must enter a name.");
        
        isHost = true;
        myRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
        processName(nameInput);

        localGameConfig = { seers: document.getElementById('cfg-seers').value, docs: document.getElementById('cfg-docs').value };

        await sb.from('rooms').insert([{ room_code: myRoom, night_duration: document.getElementById('cfg-night').value, day_duration: document.getElementById('cfg-day').value }]);
        enterLobby();
    }

    function prepareJoin() {
        myRoom = document.getElementById('join-code').value.toUpperCase().trim();
        if(!myRoom) return;
        document.getElementById('target-room').innerText = myRoom;
        let randAvatar = Math.floor(Math.random() * 16) + 1;
        setAvatar(randAvatar < 10 ? '0'+randAvatar : randAvatar); 
        showScreen('join-setup');
    }

    async function finalizeJoin() {
        const nameInput = document.getElementById('player-name').value;
        if(!nameInput.trim()) return alert("You must enter a name.");
        processName(nameInput);
        enterLobby();
    }

    async function enterLobby() {
        const { data } = await sb.from('players').insert([{ room_code: myRoom, username: myName, avatar: myAvatar, is_master: isMaster }]).select();
        myId = data[0].id;
        document.getElementById('room-id-display').innerText = `ROOM: ${myRoom}`;
        showScreen('game-screen');
        if(isHost) document.getElementById('start-game-btn').classList.remove('hidden');
        
        initRealtime();
        buildEmojiDrawer();
    }

    // --- REALTIME SYNC (DB & BROADCAST) ---
    function initRealtime() {
        // Sync Player Joins/Kicks
        sb.channel('db_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_code=eq.${myRoom}` }, () => { syncGrid(); }).subscribe();
        
        // Sync Room Phase (Day/Night)
        sb.channel('room_sync').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `room_code=eq.${myRoom}` }, (payload) => {
            const phase = payload.new.phase;
            if(phase === 'NIGHT') document.getElementById('app-container').style.backgroundImage = "url('assets/backgrounds/bg_night.jpg')";
            if(phase === 'DAY') document.getElementById('app-container').style.backgroundImage = "url('assets/backgrounds/bg_day.jpg')";
        }).subscribe();

        // Ephemeral Broadcast (Chat & Emojis)
        roomChannel = sb.channel(`chat_${myRoom}`, { config: { broadcast: { self: true } } });
        
        roomChannel.on('broadcast', { event: 'msg' }, payload => {
            const hist = document.getElementById('chat-history');
            hist.innerHTML += `<div class="msg"><b>${payload.payload.sender}:</b> ${payload.payload.text}</div>`;
            hist.scrollTop = hist.scrollHeight;
        });

        roomChannel.on('broadcast', { event: 'emoji' }, payload => {
            triggerEmojiAnimation(payload.payload.pid, payload.payload.emojiNum);
        });

        roomChannel.subscribe();
        syncGrid();
    }

    async function syncGrid() {
        const { data: players } = await sb.from('players').select('*').eq('room_code', myRoom).order('id', {ascending: true});
        const left = document.getElementById('left-slots'); const right = document.getElementById('right-slots');
        left.innerHTML = ''; right.innerHTML = '';

        players.forEach((p, i) => {
            const slot = `
                <div class="p-slot" id="slot-${p.id}">
                    ${isHost && p.id != myId ? `<img src="assets/ui/icon_kick.png" class="kick-btn" onclick="kick(${p.id})">` : ''}
                    <img src="assets/avatars/avatar_${p.avatar}.png" class="p-avatar">
                    <div style="margin-top:5px; font-weight:bold; overflow:hidden;">${p.username}</div>
                </div>`;
            if(i % 2 === 0) left.innerHTML += slot; else right.innerHTML += slot;
        });
    }

    async function kick(id) { await sb.from('players').delete().eq('id', id); }

    // --- CHAT & EMOJIS ---
    function sendChat() {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        roomChannel.send({ type: 'broadcast', event: 'msg', payload: { sender: myName, text: input.value } });
        input.value = '';
    }

    function buildEmojiDrawer() {
        const drawer = document.getElementById('emoji-drawer');
        for(let i=1; i<=16; i++) {
            drawer.innerHTML += `<img src="assets/emojis/${i}.png" style="width:35px; cursor:pointer;" onclick="castEmoji(${i})">`;
        }
    }

    function toggleEmoji() {
        const drawer = document.getElementById('emoji-drawer');
        drawer.style.display = drawer.style.display === 'grid' ? 'none' : 'grid';
    }

    function castEmoji(num) {
        document.getElementById('emoji-drawer').style.display = 'none';
        roomChannel.send({ type: 'broadcast', event: 'emoji', payload: { pid: myId, emojiNum: num } });
    }

    function triggerEmojiAnimation(playerId, emojiNum) {
        const slot = document.getElementById(`slot-${playerId}`);
        if(!slot) return;
        const img = document.createElement('img');
        img.src = `assets/emojis/${emojiNum}.png`;
        img.className = 'anim-emoji';
        slot.appendChild(img);
        setTimeout(() => slot.removeChild(img), 2000); // Remove after animation ends
    }

    // --- GAME ENGINE (ROLES) ---
    async function startGameLoop() {
        document.getElementById('start-game-btn').style.display = 'none';
        
        const { data: players } = await sb.from('players').select('id, is_master').eq('room_code', myRoom);
        let nPlayers = players.filter(p => !p.is_master);
        
        let sCount = parseInt(localGameConfig.seers);
        let dCount = parseInt(localGameConfig.docs);
        let wCount = Math.max(1, Math.floor(nPlayers.length / 3)); // 1 Wolf per 3 normal players

        nPlayers.sort(() => Math.random() - 0.5); // Shuffle

        let updates = [];
        players.forEach(p => {
            if(p.is_master) return updates.push({ id: p.id, role: 'MASTER' });
            
            let r = 'Villager';
            if(wCount > 0) { r = 'Werewolf'; wCount--; }
            else if(sCount > 0) { r = 'Seer'; sCount--; }
            else if(dCount > 0) { r = 'Doctor'; dCount--; }
            updates.push({ id: p.id, role: r });
        });

        for (let u of updates) { await sb.from('players').update({ role: u.role }).eq('id', u.id); }
        await sb.from('rooms').update({ phase: 'NIGHT' }).eq('room_code', myRoom);
    }
</script>
</body>
</html>
