<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf: Bloodline</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap');

        :root {
            --blood-red: #8a0303;
            --blood-orange: #ff4500;
            --dark-void: #0a0a0a;
            --ui-bg: rgba(15, 15, 15, 0.95);
        }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; display: flex; justify-content: center; align-items: center; font-family: 'Almendra', serif; color: #e0e0e0; }

        #app-container {
            width: 100%; max-width: 430px; height: 100%; max-height: 932px;
            background-color: var(--dark-void);
            background-image: none; 
            background-size: cover; background-position: center;
            position: relative; box-shadow: 0 0 30px rgba(138, 3, 3, 0.5); 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- PHASE TRANSITION FADER --- */
        #phase-transition {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 1s ease-in-out;
        }

        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; background: rgba(0,0,0,0.6); }
        .hidden { display: none !important; }

        /* Preloader */
        #loading-screen { position: absolute; z-index: 5000; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loading-text { color: var(--blood-red); font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 20px; }
        .progress-bar { width: 60%; height: 5px; background: #222; border-radius: 5px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--blood-red); transition: width 0.2s; }

        h2 { text-align: center; color: var(--blood-red); text-shadow: 2px 2px 4px #000; letter-spacing: 2px; font-weight: 700; border-bottom: 1px solid var(--blood-red); padding-bottom: 10px;}
        label { color: #aaa; font-size: 0.9rem; margin-top: 10px; display: flex; justify-content: space-between;}

        .btn-custom { background: linear-gradient(180deg, #2a0808 0%, #110000 100%); border: 1px solid var(--blood-red); color: #fff; padding: 15px; font-size: 1.3rem; cursor: pointer; font-family: 'Almendra', serif; border-radius: 5px; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.8); transition: 0.3s; }
        .btn-custom:active { transform: scale(0.98); box-shadow: 0 0 10px var(--blood-red); }

        input[type="text"] { background: rgba(0,0,0,0.7); border: 1px solid #444; border-left: 3px solid var(--blood-red); color: white; padding: 12px; font-size: 1.1rem; width: 100%; box-sizing: border-box; margin: 5px 0 15px 0; font-family: 'Almendra', serif; outline: none; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--blood-red); cursor: pointer; margin-top: -8px; box-shadow: 0 0 5px var(--blood-orange); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #333; border-radius: 3px; border: 1px solid #000; }

        .profile-preview { width: 100px; height: 100px; border-radius: 8px; border: 3px solid var(--blood-red); cursor: pointer; margin: 10px auto; display: block; box-shadow: 0 0 15px rgba(138,3,3,0.8); object-fit: cover;}
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box;}
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; padding: 10px; }
        .avatar-opt { width: 100%; aspect-ratio: 1/1; border-radius: 6px; border: 2px solid transparent; cursor: pointer; object-fit: cover; }
        .avatar-opt.selected { border-color: var(--blood-orange); filter: drop-shadow(0 0 5px var(--blood-orange)); }

        /* Game Stage */
        #top-status-bar { text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--blood-orange); padding: 5px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; letter-spacing: 1px;}
        #game-stage { flex: 1; display: grid; grid-template-columns: 80px 1fr 80px; gap: 5px; margin-top: 5px; overflow: hidden; }
        .side-panel { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-bottom: 10px;}
        
        .p-slot { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border: 1px solid #333; padding: 5px; border-radius: 8px; text-align: center; font-size: 11px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.8); cursor: pointer; transition: 0.2s;}
        .p-slot:active { transform: scale(0.95); }
        .p-avatar { width: 60px; height: 60px; border-radius: 6px; border: 1px solid var(--blood-red); object-fit: cover; position: relative; z-index: 2; }
        
        /* Slot Decorators */
        .kick-btn { position: absolute; top: -5px; left: -5px; width: 22px; height: 22px; cursor: pointer; background: #000; border-radius: 50%; z-index: 10; }
        .notif-dot { position: absolute; top: -5px; right: -5px; width: 15px; height: 15px; background: red; border-radius: 50%; border: 2px solid #000; z-index: 10; display: none; box-shadow: 0 0 5px red;}

        /* Chat System */
        #chat-window { background: var(--ui-bg); border: 1px solid #333; border-radius: 5px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-header { background: #000; text-align: center; padding: 5px; font-size: 0.9rem; color: var(--blood-orange); border-bottom: 1px solid var(--blood-red); font-weight: bold;}
        #chat-history { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; font-family: sans-serif; display: flex; flex-direction: column; gap: 5px;}
        
        .msg { background: rgba(255,255,255,0.1); padding: 5px 8px; border-radius: 4px; word-wrap: break-word;}
        .msg.private { background: rgba(138,3,3,0.3); border-left: 2px solid var(--blood-orange); }
        
        /* Full Width Bottom Bar */
        #bottom-bar { display: flex; align-items: center; padding: 10px; background: #050505; border-top: 2px solid var(--blood-red); gap: 10px; width: 100%; box-sizing: border-box; z-index: 100;}
        #emoji-drawer { position: absolute; bottom: 80px; right: 10px; background: #111; border: 1px solid var(--blood-red); border-radius: 8px; display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; z-index: 500; }

        /* Emoji Center Animation */
        @keyframes centerFloatFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            70% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -90%) scale(1); }
        }
        .anim-emoji { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; pointer-events: none; z-index: 100; animation: centerFloatFade 2s forwards ease-out; }

        /* 3D SWIVEL ANIMATION */
        @keyframes swivelReveal {
            0% { transform: scale(0.5) rotateY(0deg) translateY(50px); opacity: 0; }
            40% { transform: scale(1.1) rotateY(360deg) translateY(-20px); opacity: 1; }
            100% { transform: scale(1.3) rotateY(1080deg) translateY(-10px); box-shadow: 0 0 30px var(--blood-orange);}
        }

        #role-reveal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .r-card { width: 180px; height: 270px; transform-style: preserve-3d; position: relative; }
        .r-card.swivel { animation: swivelReveal 1.8s ease-out forwards; }
        .r-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; background-size: cover; border: 3px solid #333;}
        .r-front { transform: rotateY(180deg); }
        .r-back { background-image: url('assets/cards/card_back.png'); }
    </style>
</head>
<body>

<div id="loading-screen">
    <div id="loading-text">AWAKENING...</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="app-container" class="hidden">
    
    <div id="phase-transition"></div>

    <div id="start-screen" class="screen">
        <img src="assets/ui/werewolf.png" style="width: 90%; margin: 60px auto 40px auto; filter: drop-shadow(0 0 10px rgba(138,3,3,0.8));">
        <button class="btn-custom" onclick="showScreen('config-screen')">CREATE ROOM</button>
        <div style="text-align: center; margin: 20px 0; color: #555;">— OR —</div>
        <input type="text" id="join-code" placeholder="ENTER 4-LETTER CODE" style="text-align: center; letter-spacing: 5px; font-weight: bold;" maxlength="4">
        <button class="btn-custom" style="border-color: #444;" onclick="prepareJoin()">JOIN ROOM</button>
    </div>

    <div id="config-screen" class="screen hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <img src="assets/ui/icon_exit.png" style="height:35px; cursor:pointer;" onclick="location.reload()">
            <h2 style="margin:0; border:none;">THE RITUAL</h2><div style="width:35px;"></div> 
        </div>
        
        <img src="assets/avatars/avatar_01.png" id="host-avatar-prev" class="profile-preview" onclick="openAvatarModal('host')">
        <input type="text" id="host-name" placeholder="Enter username..." maxlength="12">
        
        <div style="background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; border: 1px solid #333;">
            <label><span>MAX PLAYERS</span> <span id="val-players" style="color:var(--blood-orange);">8</span></label>
            <input type="range" id="cfg-players" min="5" max="16" value="8" oninput="updateSliders()">
            
            <label><span>DAY (VOTING)</span> <span id="val-day" style="color:var(--blood-orange);">0s (Unlimited)</span></label>
            <input type="range" id="cfg-day" min="0" max="120" step="20" value="0" oninput="updateSliders()">

            <label><span>NIGHT PHASE</span> <span style="color:var(--blood-red);">30s Fixed</span></label>

            <label><span>SEERS</span> <span id="val-seers" style="color:var(--blood-orange);">1</span></label>
            <input type="range" id="cfg-seers" min="0" max="3" value="1" oninput="updateSliders()">

            <label><span>DOCTORS</span> <span id="val-docs" style="color:var(--blood-orange);">1</span></label>
            <input type="range" id="cfg-docs" min="0" max="3" value="1" oninput="updateSliders()">
        </div>
        <button class="btn-custom" onclick="createRoom()" style="margin-top: 20px;">SUMMON LOBBY</button>
    </div>

    <div id="join-setup" class="screen hidden">
        <img src="assets/ui/icon_exit.png" style="height:35px; cursor:pointer; position:absolute; top:20px; left:20px;" onclick="location.reload()">
        <h2 style="margin-top: 50px;">JOINING: <span id="target-room" style="color:white;"></span></h2>
        <img src="assets/avatars/avatar_02.png" id="player-avatar-prev" class="profile-preview" onclick="openAvatarModal('player')">
        <input type="text" id="player-name" placeholder="Enter username..." maxlength="12">
        <button class="btn-custom" onclick="finalizeJoin()">ENTER LOBBY</button>
    </div>

    <div id="game-screen" class="screen hidden" style="padding: 10px 10px 0 10px;">
        <div id="lobby-header" style="display:flex; justify-content:space-between; align-items:center; background: #000; padding: 10px; border-bottom: 2px solid var(--blood-red); border-radius: 5px;">
            <img src="assets/ui/icon_exit.png" style="height:30px; cursor:pointer;" onclick="location.reload()">
            <h3 id="room-id-display" style="margin:0; letter-spacing: 2px;">ROOM: ----</h3>
            <button id="start-game-btn" class="hidden" style="background:var(--blood-red); color:white; border:none; padding:8px 15px; border-radius:3px; font-family:'Almendra'; font-weight:bold; cursor:pointer; font-size:1.1rem;" onclick="initiateRoleReveal()">PLAY</button>
        </div>

        <div id="top-status-bar">WAITING FOR PLAYERS...</div>

        <div id="game-stage">
            <div id="left-slots" class="side-panel"></div>
            
            <div id="chat-window">
                <div id="chat-header" id="chat-context-title" onclick="setChatContext('global')" style="cursor:pointer;">🌐 GLOBAL CHAT (Click to Reset)</div>
                <div id="chat-history"></div>
                <div id="emoji-drawer"></div>
            </div>
            
            <div id="right-slots" class="side-panel"></div>
        </div>
    </div>

    <div id="bottom-bar" class="hidden">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0; flex:1; font-family: sans-serif; font-size: 1rem; padding: 12px; border-radius: 20px;">
        <img src="assets/emojis/1.png" style="height:40px; cursor:pointer;" onclick="toggleEmoji()">
        <img src="assets/ui/enter.png" style="height:45px; cursor:pointer;" onclick="sendChat()">
    </div>

    <div id="avatar-modal" class="modal">
        <h2>SELECT YOUR FORM</h2>
        <div class="avatar-grid" id="modal-grid"></div>
        <button class="btn-custom" onclick="closeAvatarModal()" style="margin-top:auto;">CONFIRM</button>
    </div>

    <div id="role-reveal-overlay" onclick="this.style.display='none'">
        <h2 id="role-reveal-title" style="border:none; margin-bottom: 40px; font-size:2rem;">YOUR DESTINY</h2>
        <div class="r-card" id="my-role-card">
            <div class="r-face r-front" id="my-role-art" style="background-image:url('assets/cards/card_villager.png')"></div>
            <div class="r-face r-back"></div>
        </div>
    </div>

</div>

<script>
    const SUPABASE_URL = "https://uzqgleedmzxicejpbqqx.supabase.co";
    const SUPABASE_KEY = "YOUR_ANON_KEY"; 
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myId, myRoom, myName, myAvatar = "01", myAssignedRole = "Villager", isHost = false, isMaster = false, targetProfile = 'host';
    let localGameConfig = { maxPlayers: 8, seers: 1, docs: 1, dayTime: 0 }; 
    let roomChannel; 
    let gameLoopInterval = null;
    let localChatHistory = [];
    let currentChatContext = 'global';

    // --- ASSET PRELOADER ---
    const assetsToLoad = [
        'assets/backgrounds/bg_lobby.jpg', 'assets/backgrounds/bg_day.jpg', 'assets/backgrounds/bg_night.jpg',
        'assets/ui/werewolf.png', 'assets/ui/icon_exit.png', 'assets/ui/enter.png', 'assets/ui/icon_kick.png',
        'assets/cards/card_back.png', 'assets/cards/card_villager.png', 'assets/cards/card_wolf.png', 'assets/cards/card_seer.png', 'assets/cards/card_doc.png'
    ];
    for(let i=1; i<=16; i++) assetsToLoad.push(`assets/avatars/avatar_${i<10?'0'+i:i}.png`);
    for(let i=1; i<=20; i++) assetsToLoad.push(`assets/emojis/${i}.png`);

    let loadedCount = 0;
    window.onload = () => {
        assetsToLoad.forEach(src => {
            const img = new Image();
            img.onload = () => {
                loadedCount++;
                document.getElementById('progress-fill').style.width = `${(loadedCount / assetsToLoad.length) * 100}%`;
                if(loadedCount === assetsToLoad.length) setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('app-container').style.backgroundImage = "url('assets/backgrounds/bg_lobby.jpg')";
                }, 500);
            };
            img.src = src;
        });
    };

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

    // --- BIND ENTER KEY ---
    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { sendChat(); }
    });

    // --- ANIMATED BACKGROUND CHANGER ---
    function changeBackground(url) {
        const fader = document.getElementById('phase-transition');
        const container = document.getElementById('app-container');
        if (container.style.backgroundImage.includes(url)) return; // Don't animate if same bg
        
        fader.style.opacity = 1;
        setTimeout(() => {
            container.style.backgroundImage = `url('${url}')`;
            fader.style.opacity = 0;
        }, 1000);
    }

    // --- CONFIG SLIDERS ---
    function updateSliders() {
        const p = parseInt(document.getElementById('cfg-players').value); document.getElementById('val-players').innerText = p;
        const day = parseInt(document.getElementById('cfg-day').value); document.getElementById('val-day').innerText = day === 0 ? "0s (Unlimited)" : `${day}s`;
        let s = parseInt(document.getElementById('cfg-seers').value); let d = parseInt(document.getElementById('cfg-docs').value);
        if(s + d >= p - 2) { s = Math.max(0, s-1); d = Math.max(0, d-1); }
        document.getElementById('cfg-seers').value = s; document.getElementById('val-seers').innerText = s;
        document.getElementById('cfg-docs').value = d; document.getElementById('val-docs').innerText = d;
        localGameConfig = { maxPlayers: p, seers: s, docs: d, dayTime: day };
    }

    // --- AVATARS & NAMES ---
    function openAvatarModal(type) {
        targetProfile = type; const modal = document.getElementById('avatar-modal'); const grid = document.getElementById('modal-grid');
        grid.innerHTML = ''; for(let i=1; i<=16; i++) { let num = i < 10 ? '0'+i : i; grid.innerHTML += `<img src="assets/avatars/avatar_${num}.png" class="avatar-opt" onclick="setAvatar('${num}')">`; }
        modal.style.display = 'flex';
    }
    function setAvatar(num) { myAvatar = num; document.getElementById(targetProfile === 'host' ? 'host-avatar-prev' : 'player-avatar-prev').src = `assets/avatars/avatar_${num}.png`; closeAvatarModal(); }
    function closeAvatarModal() { document.getElementById('avatar-modal').style.display = 'none'; }

    function processName(val) {
        let raw = val.trim(); let splitIndex = raw.indexOf('_');
        if (splitIndex !== -1) {
            let base = raw.substring(0, splitIndex).substring(0, 6);
            if (raw.substring(splitIndex + 1) === 'BLACK') { isMaster = true; myName = base; } else { isMaster = false; myName = base; }
        } else { isMaster = false; myName = raw.substring(0, 6); }
    }

    // --- ENTRY & REJOIN ---
    async function createRoom() {
        const nameInput = document.getElementById('host-name').value;
        if(!nameInput.trim()) return alert("Enter a name.");
        isHost = true; myRoom = Math.random().toString(36).substring(2, 6).toUpperCase(); processName(nameInput);
        
        // Use localGameConfig safely, defaulting to 0 if unmodified
        const dayDur = localGameConfig.dayTime || 0;
        
        const { error } = await sb.from('rooms').insert([{ room_code: myRoom, phase: 'LOBBY', time_remaining: 0, day_duration: dayDur, night_duration: 30 }]);
        if (error) { alert("Error Summoning Lobby: " + error.message); return; }
        enterLobby();
    }

    function prepareJoin() {
        myRoom = document.getElementById('join-code').value.toUpperCase().trim(); if(!myRoom) return;
        document.getElementById('target-room').innerText = myRoom;
        let r = Math.floor(Math.random() * 16) + 1; setAvatar(r < 10 ? '0'+r : r); 
        showScreen('join-setup');
    }

    async function finalizeJoin() {
        if(!document.getElementById('player-name').value.trim()) return alert("Enter a name.");
        processName(document.getElementById('player-name').value); enterLobby();
    }

    async function enterLobby() {
        const { data: existing } = await sb.from('players').select('*').eq('room_code', myRoom).eq('username', myName);
        if(existing && existing.length > 0) {
            myId = existing[0].id; await sb.from('players').update({ avatar: myAvatar }).eq('id', myId);
        } else {
            const { data, error } = await sb.from('players').insert([{ room_code: myRoom, username: myName, avatar: myAvatar, is_master: isMaster }]).select();
            if (error) { alert("Error joining lobby: " + error.message); return; }
            myId = data[0].id;
        }

        document.getElementById('room-id-display').innerText = `ROOM: ${myRoom}`;
        showScreen('game-screen'); document.getElementById('bottom-bar').classList.remove('hidden');
        if(isHost) document.getElementById('start-game-btn').classList.remove('hidden');
        initRealtime(); buildEmojiDrawer();
    }

    // --- REALTIME ---
    function initRealtime() {
        sb.channel('db_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_code=eq.${myRoom}` }, () => { syncGrid(); }).subscribe();
        
        sb.channel('room_sync').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `room_code=eq.${myRoom}` }, (payload) => {
            const r = payload.new;
            document.getElementById('top-status-bar').innerText = `${r.phase} PHASE - ${r.time_remaining}s`;
            if(r.phase === 'NIGHT') changeBackground('assets/backgrounds/bg_night.jpg');
            else if(r.phase === 'DAY' || r.phase === 'VOTING') changeBackground('assets/backgrounds/bg_day.jpg');
            else if(r.phase === 'LOBBY') { 
                changeBackground('assets/backgrounds/bg_lobby.jpg'); 
                document.getElementById('top-status-bar').innerText = `WAITING FOR PLAYERS...`; 
                localChatHistory = []; renderChat(); 
                if(isHost) document.getElementById('start-game-btn').style.display='block';
            }
        }).subscribe();

        roomChannel = sb.channel(`chat_${myRoom}`, { config: { broadcast: { self: true } } });
        roomChannel.on('broadcast', { event: 'msg' }, payload => {
            localChatHistory.push(payload.payload);
            renderChat();
            
            const p = payload.payload;
            if(p.type === 'private' && p.targetId == myId && currentChatContext != p.senderId) {
                document.getElementById(`notif-${p.senderId}`).style.display = 'block';
            }
        });
        roomChannel.on('broadcast', { event: 'emoji' }, payload => { triggerEmojiAnimation(payload.payload.pid, payload.payload.emojiNum); });
        roomChannel.on('broadcast', { event: 'trigger_reveal' }, payload => { 
            myAssignedRole = payload.payload.roles[myId]; 
            if(!isMaster) revealMyRole(true); 
        });
        
        roomChannel.subscribe(); syncGrid();
    }

    let pCache = {}; 
    async function syncGrid() {
        const { data: players } = await sb.from('players').select('*').eq('room_code', myRoom).order('id', {ascending: true});
        const left = document.getElementById('left-slots'); const right = document.getElementById('right-slots');
        left.innerHTML = ''; right.innerHTML = ''; pCache = {};

        players.forEach((p, i) => {
            pCache[p.id] = p.username;
            const slot = `
                <div class="p-slot" id="slot-${p.id}" onclick="handleProfileClick(${p.id}, '${p.username}')">
                    ${isHost && p.id != myId && document.getElementById('top-status-bar').innerText.includes('WAITING') ? `<img src="assets/ui/icon_kick.png" class="kick-btn" onclick="kickPlayer(event, ${p.id})">` : ''}
                    <div class="notif-dot" id="notif-${p.id}"></div>
                    <img src="assets/avatars/avatar_${p.avatar}.png" class="p-avatar">
                    <div style="margin-top:5px; font-weight:bold; overflow:hidden;">${p.username}</div>
                    ${isMaster ? `<div style="color:cyan; font-size:8px;">${p.role || ''}</div>` : ''}
                </div>`;
            if(i % 2 === 0) left.innerHTML += slot; else right.innerHTML += slot;
        });
    }

    async function kickPlayer(e, id) {
        e.stopPropagation();
        const { error } = await sb.from('players').delete().eq('id', id);
        if (error) alert("Could not kick player: " + error.message);
    }

    // --- INTERACTION & CHAT ---
    function handleProfileClick(pid, name) {
        if(pid === myId) { revealMyRole(false); } 
        else {
            currentChatContext = pid;
            document.getElementById(`notif-${pid}`).style.display = 'none'; 
            document.getElementById('chat-header').innerText = `👤 WHISPERING: ${name.toUpperCase()} (Click to Global)`;
            document.getElementById('chat-header').style.color = "cyan";
            renderChat();
        }
    }

    function setChatContext(ctx) {
        currentChatContext = 'global';
        document.getElementById('chat-header').innerText = `🌐 GLOBAL CHAT (Click to Reset)`;
        document.getElementById('chat-header').style.color = "var(--blood-orange)";
        renderChat();
    }

    function renderChat() {
        const hist = document.getElementById('chat-history'); hist.innerHTML = '';
        localChatHistory.forEach(p => {
            if(p.type === 'global' && currentChatContext === 'global') {
                hist.innerHTML += `<div class="msg"><b>${p.sender}:</b> ${p.text}</div>`;
            } else if (p.type === 'private' && (currentChatContext === 'global' ? false : true)) {
                if ((p.targetId == myId && p.senderId == currentChatContext) || (p.senderId == myId && p.targetId == currentChatContext)) {
                    hist.innerHTML += `<div class="msg private"><b>[Priv] ${p.sender}:</b> ${p.text}</div>`;
                } else if (isMaster && currentChatContext === 'global') {
                    hist.innerHTML += `<div class="msg private" style="border-color:cyan;"><b>[SPY] ${p.sender} to ${pCache[p.targetId]}:</b> ${p.text}</div>`;
                }
            }
        });
        hist.scrollTop = hist.scrollHeight;
    }

    function sendChat() {
        const input = document.getElementById('chat-input'); if(!input.value.trim()) return;
        let payload = { sender: myName, senderId: myId, text: input.value, type: currentChatContext === 'global' ? 'global' : 'private' };
        if(payload.type === 'private') payload.targetId = currentChatContext;
        roomChannel.send({ type: 'broadcast', event: 'msg', payload: payload });
        input.value = '';
    }

    // --- EMOJIS (20) ---
    function buildEmojiDrawer() {
        const drawer = document.getElementById('emoji-drawer');
        for(let i=1; i<=20; i++) { drawer.innerHTML += `<img src="assets/emojis/${i}.png" style="width:35px; cursor:pointer;" onclick="castEmoji(${i})">`; }
    }
    function toggleEmoji() { const d = document.getElementById('emoji-drawer'); d.style.display = d.style.display === 'grid' ? 'none' : 'grid'; }
    function castEmoji(num) { document.getElementById('emoji-drawer').style.display = 'none'; roomChannel.send({ type: 'broadcast', event: 'emoji', payload: { pid: myId, emojiNum: num } }); }
    function triggerEmojiAnimation(pid, num) {
        const slot = document.getElementById(`slot-${pid}`); if(!slot) return;
        const img = document.createElement('img'); img.src = `assets/emojis/${num}.png`; img.className = 'anim-emoji';
        slot.appendChild(img); setTimeout(() => slot.removeChild(img), 2000); 
    }

    // --- ROLES & ANIMATIONS ---
    async function initiateRoleReveal() {
        document.getElementById('start-game-btn').style.display = 'none';
        const { data: players } = await sb.from('players').select('*').eq('room_code', myRoom);
        
        let pool = [];
        for(let i=0; i<localGameConfig.seers; i++) pool.push('Seer');
        for(let i=0; i<localGameConfig.docs; i++) pool.push('Doctor');
        let wCount = Math.max(1, Math.floor(players.length / 3));
        for(let i=0; i<wCount; i++) pool.push('Werewolf');
        while(pool.length < players.length) pool.push('Villager');
        pool.sort(() => Math.random() - 0.5);

        let assignments = {};
        for(let i=0; i<players.length; i++) {
            let r = players[i].is_master ? 'MASTER' : pool[i];
            assignments[players[i].id] = r;
            await sb.from('players').update({ role: r }).eq('id', players[i].id);
        }

        roomChannel.send({ type: 'broadcast', event: 'trigger_reveal', payload: { roles: assignments } });
        
        setTimeout(async () => {
            await sb.from('rooms').update({ phase: 'NIGHT', time_remaining: 30 }).eq('room_code', myRoom);
            hostGameLoop('NIGHT', 30);
        }, 5000);
    }

    function revealMyRole(isDramatic) {
        if(isMaster || !myAssignedRole) return;
        
        const overlay = document.getElementById('role-reveal-overlay');
        const card = document.getElementById('my-role-card');
        const art = document.getElementById('my-role-art');
        
        let file = 'card_villager.png';
        if(myAssignedRole === 'Werewolf') file = 'card_wolf.png';
        if(myAssignedRole === 'Seer') file = 'card_seer.png';
        if(myAssignedRole === 'Doctor') file = 'card_doc.png';
        
        art.style.backgroundImage = `url('assets/cards/${file}')`;
        card.className = 'r-card'; 
        overlay.style.display = 'flex';
        
        void card.offsetWidth; 
        
        if(isDramatic) {
            document.getElementById('role-reveal-title').innerText = "YOUR DESTINY";
            card.classList.add('swivel');
            setTimeout(() => { overlay.style.display = 'none'; }, 5000); 
        } else {
            document.getElementById('role-reveal-title').innerText = "YOUR ROLE (TAP TO CLOSE)";
            card.style.transform = "rotateY(180deg) scale(1.3)"; 
        }
    }

    // --- HOST LOOP ---
    function hostGameLoop(phase, duration) {
        let currentTimer = duration; clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(async () => {
            currentTimer--;
            await sb.from('rooms').update({ time_remaining: currentTimer }).eq('room_code', myRoom);

            if(currentTimer <= 0) {
                clearInterval(gameLoopInterval);
                let nextPhase = phase === 'NIGHT' ? 'DAY' : 'VOTING';
                let nextDur = phase === 'NIGHT' ? localGameConfig.dayTime : 30; 
                
                if(phase === 'VOTING') {
                    await sb.from('rooms').update({ phase: 'LOBBY', time_remaining: 0 }).eq('room_code', myRoom);
                    roomChannel.send({ type: 'broadcast', event: 'msg', payload: { sender: 'SYSTEM', text: 'GAME OVER! All memory wiped.', type: 'global' } });
                } else {
                    if (nextDur === 0 && nextPhase === 'DAY') nextDur = -1; 
                    await sb.from('rooms').update({ phase: nextPhase, time_remaining: nextDur }).eq('room_code', myRoom);
                    if (nextDur > 0) hostGameLoop(nextPhase, nextDur);
                }
            }
        }, 1000);
    }
</script>
